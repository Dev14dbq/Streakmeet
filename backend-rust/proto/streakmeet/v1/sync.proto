syntax = "proto3";

package streakmeet.v1;

import "google/protobuf/timestamp.proto";

message UserSummary {
  string id = 1;
  string nickname = 2;
  string avatar_url = 3;
}

message FriendListItem {
  string id = 1;
  string status = 2;
  bool is_incoming_request = 3;
  UserSummary friend = 4;
}

message FriendEvent {
  string event_type = 1;
  FriendListItem friendship = 2;
}

message StreakListItem {
  string id = 1;
  int32 count = 2;
  string last_met_date = 3;
  string timezone = 4;
  UserSummary partner = 5;
}

message StreakEvent {
  string event_type = 1;
  StreakListItem streak = 2;
}

message StreakCreated {
  StreakListItem streak = 1;
}

message StreakMeetUpdated {
  string streak_id = 1;
  int32 count = 2;
  string last_met_date = 3;
  UserSummary partner = 4;
}

message StreakBurned {
  string streak_id = 1;
  int32 count = 2;
}

message LocationUpdated {
  string user_id = 1;
  double lat = 2;
  double lng = 3;
}

message LocationRemoved {
  string user_id = 1;
}

message Notification {
  string type = 1;
  map<string, string> params = 2;
  string route = 3;
}

message Heartbeat {
  string message = 1;
}

message SyncEnvelope {
  string event_id = 1;
  int64 sequence = 2;
  google.protobuf.Timestamp at = 3;
  string actor_id = 4;

  oneof payload {
    FriendEvent friend_event = 10;
    StreakCreated streak_created = 11;
    StreakMeetUpdated streak_meet = 12;
    StreakEvent streak_event = 15;
    StreakBurned streak_burned = 17;
    LocationUpdated location = 13;
    LocationRemoved location_removed = 14;
    Notification notification = 16;
    Heartbeat heartbeat = 99;
  }
}

message SubscribeRequest {
  string last_event_id = 1;
}

message CatchUpRequest {
  string last_event_id = 1;
}

message AckRequest {
  string event_id = 1;
}

message AckResponse {
  bool ok = 1;
}

service SyncService {
  rpc Subscribe(SubscribeRequest) returns (stream SyncEnvelope);
  rpc CatchUp(CatchUpRequest) returns (stream SyncEnvelope);
  rpc Ack(AckRequest) returns (AckResponse);
}
