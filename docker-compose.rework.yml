# StreakMeet rework stack — Rust services + existing infra.
# Usage: docker compose -f docker-compose.yml -f docker-compose.rework.yml up -d
#
# Node backend (backend/) remains available on port 3000 during migration.

services:
  nats:
    image: nats:2.10-alpine
    container_name: streakmeet_nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  # Reuse postgres, redis, minio from docker-compose.yml (same project network).
  # Rust services are built/run on the host for dev; uncomment for container deploy:

