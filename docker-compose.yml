services:
  db:
    image: postgres:15-alpine
    container_name: streakmeet_db
    environment:
      POSTGRES_USER: streakmeet
      POSTGRES_PASSWORD: streakmeet_password
      POSTGRES_DB: streakmeet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streakmeet_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    # Default MinIO images need x86-64-v2 (SSE4+). This VPS (QEMU vCPU) only has SSE2 — use -cpuv1.
    # https://github.com/minio/minio/issues/18365
    image: minio/minio:RELEASE.2023-12-02T10-51-33Z-cpuv1
    container_name: streakmeet_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streakmeet
      MINIO_ROOT_PASSWORD: streakmeet_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
