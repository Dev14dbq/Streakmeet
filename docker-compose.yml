services:
  db:
    image: postgres:15-alpine
    container_name: streakmeet_db
    environment:
      POSTGRES_USER: streakmeet
      POSTGRES_PASSWORD: streakmeet_password
      POSTGRES_DB: streakmeet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streakmeet_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
